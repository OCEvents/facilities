<!DOCTYPE html>
<html lang="en">
<head>

  background-color: #162a4f;
  font-weight: bold;
}

#public-calendar {
  padding: 20px;
}
</style>
</head>

<body>

<div class="tabs">

</div>

<div id="public-calendar"></div>

<script>
var origin = "https://forneyisd.incidentiq.com";

const viewMap = {
  admin: "4336b81c-4450-f011-8f7c-000d3a0db9a7",
  annex: "d67dc734-87d4-f011-8195-000d3ae39c9e",
  blackburn: "7400996b-a9c0-f011-8193-000d3a7c34a9",
  brown: "71a519a9-39d1-f011-8195-000d3ae39c9e",
  claybon: "f04942f9-9311-f111-832f-000d3a7bbbb6",
  criswell: "a7ed1f1a-52c9-f011-8195-000d3ae39c9e",

  crosby: "",      
  dewberry: "",    
  fhs: "",         
  griffin: "",     
  henderson: "",   
  jackson: "",     
  jacobs: "",      
  johnson: "",     
  jones: "",       
  lewis: "",       
  nfhs: "",        
  oc: "",          
  rhea: "",        
  rhodes: "",      
  smith: "",       
  themer: "",      
  warren: "",      
  willett: "",     
  wilson: ""       
};

function getQueryParam(param) {
  const urlParams = new URLSearchParams(window.location.search);
  return urlParams.get(param);
}

const selectedView = getQueryParam("view") || "admin";

if (document.getElementById("tab-" + selectedView)) {
  document.getElementById("tab-" + selectedView).classList.add("active");
}

(function(doc, tag, id){
  if (doc.getElementById(id)) {return;}
  var js = doc.createElement(tag);
  js.id = id;
  js.src = origin + "/core/shared/public-calendar.js";
  js.type = "text/javascript";
  doc.body.appendChild(js);
}(document, 'script', 'public-calendar-script'));

window.onload = function() {

if (!viewMap[selectedView]) {
  document.getElementById("public-calendar").innerHTML =
    "<p style='color:red;'>View not configured yet.</p>";
  return;
}

PublicCalendar.setOptions({
  origin: origin,
  targetId: "public-calendar",
  upcoming: true,
  viewId: viewMap[selectedView]
});

PublicCalendar.render();

}
</script>

</body>
</html>
