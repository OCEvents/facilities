<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>IIQ Calendar Views</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  height: 100vh;
  overflow: hidden;
}

/* Sidebar overlay style */
.sidebar {
  position: fixed;
  top: 0;
  left: -200px;              /* Hidden off-screen */
  width: 175px;
  height: 100%;
  background-color: #1f3b6d;
  overflow-y: auto;
  transition: left 0.3s ease;
  z-index: 1001;
}

.sidebar.open {
  left: 0;                   /* Slide in */
}

.sidebar a {
  display: block;
  padding: 9px 14px;
  color: white;
  text-decoration: none;
  font-size: 15px;
}

.sidebar a:hover {
  background-color: #2c4d89;
}

.sidebar a.active {
  background-color: #162a4f;
  font-weight: bold;
}

/* Overlay behind sidebar */
.overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.35);
  display: none;
  z-index: 1000;
}

.overlay.show {
  display: block;
}

/* Toggle button */
.toggle-btn {
  position: fixed;
  top: 10px;
  left: 10px;
  z-index: 1100;
  background-color: #1f3b6d;
  color: white;
  border: none;
  padding: 6px 10px;
  cursor: pointer;
  font-size: 16px;
  border-radius: 4px;
}

.toggle-btn:hover {
  background-color: #2c4d89;
}

/* Main content */
iframe {
  width: 100%;
  height: 100%;
  border: none;
}
</style>
</head>

<body>

<button class="toggle-btn" onclick="toggleSidebar()">☰</button>

<div class="sidebar" id="sidebar">
  <a href="admin.html" target="contentFrame">Admin</a>
  <a href="annex.html" target="contentFrame">Annex</a>
  <a href="blackburn.html" target="contentFrame">Blackburn</a>
  <a href="brown.html" target="contentFrame">Brown</a>
  <a href="claybon.html" target="contentFrame">Claybon</a>
  <a href="criswell.html" target="contentFrame">Criswell</a>
  <a href="crosby.html" target="contentFrame">Crosby</a>
  <a href="dewberry.html" target="contentFrame">Dewberry</a>
  <a href="fhs.html" target="contentFrame">FHS</a>
  <a href="griffin.html" target="contentFrame">Griffin</a>
  <a href="henderson.html" target="contentFrame">Henderson</a>
  <a href="jackson.html" target="contentFrame">Jackson</a>
  <a href="jacobs.html" target="contentFrame">Jacobs</a>
  <a href="johnson.html" target="contentFrame">Johnson</a>
  <a href="jones.html" target="contentFrame">Jones</a>
  <a href="lewis.html" target="contentFrame">Lewis</a>
  <a href="nfhs.html" target="contentFrame">NFHS</a>
  <a href="oc.html" target="contentFrame">OC</a>
  <a href="rhea.html" target="contentFrame">Rhea</a>
  <a href="rhodes.html" target="contentFrame">Rhodes</a>
  <a href="smith.html" target="contentFrame">Smith</a>
  <a href="themer.html" target="contentFrame">Themer</a>
  <a href="warren.html" target="contentFrame">Warren</a>
  <a href="willett.html" target="contentFrame">Willett</a>
  <a href="wilson.html" target="contentFrame">Wilson</a>
</div>

<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<iframe name="contentFrame" src="admin.html"></iframe>

<script>
const sidebar = document.getElementById("sidebar");
const overlay = document.getElementById("overlay");

function toggleSidebar() {
  sidebar.classList.toggle("open");
  overlay.classList.toggle("show");
}

function closeSidebar() {
  sidebar.classList.remove("open");
  overlay.classList.remove("show");
}

/* Active tab highlighting */
const links = document.querySelectorAll(".sidebar a");

links.forEach(link => {
  link.addEventListener("click", function() {
    links.forEach(l => l.classList.remove("active"));
    this.classList.add("active");
    closeSidebar();
  });
});

/* Set default active (Admin) on load */
window.onload = function() {
  links[0].classList.add("active");
};
</script>

</body>
</html>
